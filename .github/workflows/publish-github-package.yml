name: Publish to GitHub Packages

# Publish the package to GitHub Packages on semver tags (e.g. v1.2.3).
# These repos release via `commit-and-tag-version` (the `version` script),
# which creates a `v`-prefixed git tag — push it with `git push --follow-tags`.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch: # manual test-run without cutting a release
    inputs:
      dry_run:
        description: "Dry run (install + pack + auth check, no upload)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      # Scope ONLY @navio-dk to GH Packages; all other deps stay on npmjs.
      # Token is substituted at render time, so it works for both npm and bun
      # (no reliance on .npmrc env-var expansion).
      - name: Configure GitHub Packages auth
        run: |
          echo "@navio-dk:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: bun install

      # --ignore-scripts skips the prepare/husky hook; raw-TS package needs no build.
      # --dry-run (manual dispatch only) stops before upload so you can verify packaging + auth.
      - name: Publish
        run: bun publish --ignore-scripts ${{ inputs.dry_run && '--dry-run' || '' }}
